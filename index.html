<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMaster - Уведомления Supabase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .notification-list {
            margin-top: 30px;
            max-height: 400px;
            overflow-y: auto;
        }

        .notification-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .notification-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .notification-time {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .input-group {
            margin: 15px 0;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 5px;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        .permission-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏃 SportMaster</h1>
        <p>Система уведомлений с подключением к Supabase</p>

        <div id="statusMessage" class="status info">
            ⏳ Инициализация подключения...
        </div>

        <div class="permission-buttons">
            <button onclick="enableNotifications()">🔔 Включить уведомления</button>
            <button onclick="testNotification()">📢 Тестовое уведомление</button>
            <button onclick="clearNotifications()">🗑️ Очистить историю</button>
        </div>

        <div class="input-group">
            <label>📋 Название таблицы для отслеживания:</label>
            <input type="text" id="tableName" placeholder="events, trainings, users..." value="events">
            <button onclick="subscribeToTable()" style="margin-top: 10px;">📡 Подписаться на таблицу</button>
        </div>

        <div class="input-group">
            <label>➕ Добавить тестовые данные в таблицу:</label>
            <input type="text" id="eventTitle" placeholder="Название события">
            <input type="text" id="eventDesc" placeholder="Описание" style="margin-top: 10px;">
            <button onclick="addTestData()" style="margin-top: 10px;">💾 Добавить запись</button>
        </div>

        <h3>📨 История уведомлений</h3>
        <div id="notificationsList" class="notification-list">
            <div class="notification-item">
                <div class="notification-title">📌 Готов к работе</div>
                <div>Нажмите "Включить уведомления" и разрешите показ уведомлений</div>
                <div class="notification-time">Только что</div>
            </div>
        </div>
    </div>

    <!-- Подключение Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ВАШИ ДАННЫЕ SUPABASE
        const SUPABASE_URL = 'https://achwrjesrnptzkpzqpzv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjaHdyamVzcm5wdHprcHpxcHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTI5MjMsImV4cCI6MjA5MzU2ODkyM30.ufRpdg04PbCY5W8pDU3J-QW0b2mPjv4db43sXvU2Y74';

        // Инициализация клиента Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let currentChannel = null;
        let notificationCount = 0;

        // Функция для обновления статуса
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        // Функция для добавления уведомления в список
        function addToNotificationList(title, message, isSystem = true) {
            const list = document.getElementById('notificationsList');
            const notificationDiv = document.createElement('div');
            notificationDiv.className = 'notification-item';
            
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            
            notificationDiv.innerHTML = `
                <div class="notification-title">${title}</div>
                <div>${message}</div>
                <div class="notification-time">${timeString}</div>
            `;
            
            list.insertBefore(notificationDiv, list.firstChild);
            
            // Ограничиваем количество уведомлений в списке
            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }
        }

        // Запрос разрешения на уведомления
        async function enableNotifications() {
            if (!("Notification" in window)) {
                updateStatus('❌ Ваш браузер не поддерживает уведомления', 'error');
                addToNotificationList('Ошибка', 'Ваш браузер не поддерживает уведомления');
                return false;
            }
            
            try {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    updateStatus('✅ Уведомления разрешены! Теперь вы будете получать оповещения', 'success');
                    addToNotificationList('Уведомления включены', 'Разрешение на показ уведомлений получено');
                    showBrowserNotification('SportMaster', 'Уведомления успешно включены!');
                    return true;
                } else {
                    updateStatus('❌ Разрешение на уведомления отклонено', 'error');
                    addToNotificationList('Ошибка', 'Разрешение на уведомления отклонено');
                    return false;
                }
            } catch (error) {
                console.error('Ошибка при запросе разрешения:', error);
                updateStatus('❌ Ошибка при запросе разрешения', 'error');
                return false;
            }
        }

        // Показ браузерного уведомления
        function showBrowserNotification(title, body, icon = '/favicon.ico') {
            if (Notification.permission === "granted") {
                const notification = new Notification(title, { 
                    body: body,
                    icon: icon,
                    silent: false
                });
                
                notification.onclick = function() {
                    window.focus();
                    this.close();
                };
                
                setTimeout(() => notification.close(), 5000);
            }
        }

        // Тестовое уведомление
        function testNotification() {
            if (Notification.permission === "granted") {
                showBrowserNotification('Тестовое уведомление', 'Если вы это видите — всё работает отлично! 🎉');
                addToNotificationList('Тест', 'Тестовое уведомление отправлено');
                updateStatus('✅ Тестовое уведомление отправлено', 'success');
            } else {
                updateStatus('❌ Сначала разрешите уведомления', 'error');
                addToNotificationList('Ошибка', 'Сначала включите уведомления');
            }
        }

        // Подписка на изменения в таблице
        async function subscribeToTable() {
            const tableName = document.getElementById('tableName').value.trim();
            
            if (!tableName) {
                updateStatus('❌ Введите название таблицы', 'error');
                return;
            }
            
            // Отписываемся от предыдущего канала
            if (currentChannel) {
                await supabase.removeChannel(currentChannel);
                addToNotificationList('Отписка', `Отписались от таблицы ${currentChannel.topic}`);
            }
            
            updateStatus(`🔄 Подписка на таблицу "${tableName}"...`, 'info');
            
            currentChannel = supabase
                .channel(`public:${tableName}`)
                .on(
                    'postgres_changes',
                    {
                        event: 'INSERT',
                        schema: 'public',
                        table: tableName
                    },
                    (payload) => {
                        console.log('Новая запись:', payload);
                        
                        const newData = payload.new;
                        const message = `Новая запись в таблице ${tableName}!`;
                        const details = JSON.stringify(newData, null, 2);
                        
                        // Показываем браузерное уведомление
                        showBrowserNotification(
                            '📢 Новые данные в SportMaster',
                            `${message}\nДанные: ${Object.values(newData).join(', ')}`
                        );
                        
                        // Добавляем в историю
                        addToNotificationList(
                            `📥 Новая запись в ${tableName}`,
                            `Данные: ${details.substring(0, 100)}${details.length > 100 ? '...' : ''}`
                        );
                        
                        updateStatus(`✅ Получены новые данные в таблице "${tableName}"`, 'success');
                        setTimeout(() => updateStatus(`✅ Активно отслеживаем таблицу "${tableName}"`, 'success'), 3000);
                    }
                )
                .subscribe((status) => {
                    console.log(`Статус подписки на ${tableName}:`, status);
                    if (status === 'SUBSCRIBED') {
                        updateStatus(`✅ Успешно подписались на таблицу "${tableName}"`, 'success');
                        addToNotificationList('Подписка активна', `Отслеживаем таблицу "${tableName}"`);
                    } else if (status === 'CHANNEL_ERROR') {
                        updateStatus(`❌ Ошибка подписки на таблицу "${tableName}"`, 'error');
                        addToNotificationList('Ошибка подписки', `Не удалось подписаться на ${tableName}`);
                    }
                });
        }

        // Добавление тестовых данных в таблицу
        async function addTestData() {
            const tableName = document.getElementById('tableName').value.trim();
            const title = document.getElementById('eventTitle').value.trim();
            const description = document.getElementById('eventDesc').value.trim();
            
            if (!tableName) {
                updateStatus('❌ Укажите название таблицы', 'error');
                return;
            }
            
            if (!title && !description) {
                updateStatus('❌ Заполните хотя бы одно поле', 'error');
                return;
            }
            
            const testData = {
                title: title || 'Тестовое событие',
                description: description || 'Это тестовая запись из SportMaster',
                created_at: new Date().toISOString(),
                id: Date.now()
            };
            
            try {
                updateStatus(`📤 Отправка данных в таблицу ${tableName}...`, 'info');
                
                const { data, error } = await supabase
                    .from(tableName)
                    .insert([testData])
                    .select();
                
                if (error) throw error;
                
                updateStatus(`✅ Данные успешно добавлены в таблицу ${tableName}`, 'success');
                addToNotificationList('Данные отправлены', `В таблицу ${tableName} добавлена запись: ${testData.title}`);
                
                // Очищаем поля
                document.getElementById('eventTitle').value = '';
                document.getElementById('eventDesc').value = '';
                
                console.log('Добавленные данные:', data);
            } catch (error) {
                console.error('Ошибка при добавлении данных:', error);
                updateStatus(`❌ Ошибка: ${error.message}`, 'error');
                addToNotificationList('Ошибка', `Не удалось добавить данные: ${error.message}`);
            }
        }

        // Очистка истории уведомлений
        function clearNotifications() {
            const list = document.getElementById('notificationsList');
            list.innerHTML = '<div class="notification-item"><div class="notification-title">📋 История очищена</div><div>Новые уведомления будут появляться здесь</div><div class="notification-time">Только что</div></div>';
            addToNotificationList('История очищена', 'Все уведомления удалены из списка');
        }

        // Проверка таблиц в базе данных
        async function checkTables() {
            try {
                const { data, error } = await supabase
                    .from('events')
                    .select('*')
                    .limit(1);
                
                if (error && error.message.includes('relation')) {
                    updateStatus('⚠️ Таблица "events" не найдена. Создайте её в Supabase Dashboard', 'info');
                    addToNotificationList('Внимание', 'Таблица "events" не существует. Создайте её через Supabase Dashboard');
                } else {
                    updateStatus('✅ Подключение к Supabase установлено', 'success');
                    addToNotificationList('Подключение установлено', 'SportMaster успешно подключён к Supabase');
                }
            } catch (error) {
                console.error('Ошибка проверки таблиц:', error);
            }
        }

        // Инициализация при загрузке страницы
        window.addEventListener('DOMContentLoaded', async () => {
            updateStatus('🚀 SportMaster инициализирован. Нажмите "Включить уведомления"', 'info');
            
            // Проверяем доступность уведомлений
            if (Notification.permission === "granted") {
                updateStatus('✅ Уведомления уже разрешены', 'success');
                addToNotificationList('Добро пожаловать', 'Уведомления уже включены');
            } else if (Notification.permission === "denied") {
                updateStatus('⚠️ Уведомления заблокированы. Разрешите их в настройках браузера', 'error');
            }
            
            // Проверяем подключение к Supabase
            await checkTables();
            
            // Автоматически подписываемся на таблицу events
            setTimeout(() => {
                if (Notification.permission === "granted") {
                    document.getElementById('tableName').value = 'events';
                    subscribeToTable();
                }
            }, 1000);
        });
    </script>
</body>
</html>
