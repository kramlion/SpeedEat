<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportMaster - Магазин спортивных товаров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: bold;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .status.warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin: 5px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #e0e0e0;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .product-info {
            padding: 20px;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .product-price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 10px 0;
        }

        .product-description {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .product-category {
            display: inline-block;
            background: #f0f0f0;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            color: #666;
            margin-bottom: 10px;
        }

        .btn-buy {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: opacity 0.3s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }

        .admin-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
        }

        .notification-badge {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .stats {
            display: flex;
            gap: 20px;
            margin: 20px 0;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🏃 SportMaster
            <span style="font-size: 14px; background: #667eea; color: white; padding: 4px 12px; border-radius: 20px;">Магазин спортивных товаров</span>
        </h1>
        <p>Подключено к Supabase • Реальное время • Уведомления</p>

        <div id="statusMessage" class="status info">
            ⏳ Загрузка товаров из базы данных...
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat-card">
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-label">Всего товаров</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalCategories">0</div>
                <div class="stat-label">Категорий</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avgPrice">0</div>
                <div class="stat-label">Средняя цена</div>
            </div>
        </div>

        <div class="permission-buttons">
            <button onclick="enableNotifications()">🔔 Включить уведомления</button>
            <button onclick="loadProducts()">🔄 Обновить товары</button>
            <button onclick="testNotification()">📢 Тест уведомления</button>
        </div>

        <div id="productsContainer">
            <div class="loading">
                <div>📦 Загрузка товаров...</div>
            </div>
        </div>

        <!-- Админ-панель для добавления товаров -->
        <div class="admin-panel">
            <h3>➕ Добавить новый товар</h3>
            <div class="form-group">
                <label>Название товара *</label>
                <input type="text" id="productName" placeholder="Например: Футбольный мяч">
            </div>
            <div class="form-group">
                <label>Цена (₽) *</label>
                <input type="number" id="productPrice" placeholder="1000">
            </div>
            <div class="form-group">
                <label>Категория</label>
                <select id="productCategory">
                    <option value="Футбол">Футбол</option>
                    <option value="Баскетбол">Баскетбол</option>
                    <option value="Теннис">Теннис</option>
                    <option value="Фитнес">Фитнес</option>
                    <option value="Бег">Бег</option>
                    <option value="Плавание">Плавание</option>
                </select>
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="productDesc" rows="3" placeholder="Описание товара..."></textarea>
            </div>
            <button onclick="addProduct()">💾 Добавить товар в базу</button>
            <button onclick="clearProducts()" style="background: #dc3545;">🗑️ Очистить все товары (тест)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ВАШИ ДАННЫЕ SUPABASE
        const SUPABASE_URL = 'https://achwrjesrnptzkpzqpzv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFjaHdyamVzcm5wdHprcHpxcHp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTI5MjMsImV4cCI6MjA5MzU2ODkyM30.ufRpdg04PbCY5W8pDU3J-QW0b2mPjv4db43sXvU2Y74';

        // Инициализация клиента Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let productsData = [];
        let notificationPermission = false;

        // Показ уведомления
        function showNotification(title, body) {
            if (notificationPermission && Notification.permission === "granted") {
                new Notification(title, { body, icon: 'https://via.placeholder.com/64' });
            }
            showToast(title, body);
        }

        // Показ всплывающего сообщения
        function showToast(title, message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'notification-badge';
            toast.style.background = type === 'error' ? '#dc3545' : '#28a745';
            toast.innerHTML = `<strong>${title}</strong><br>${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Обновление статуса
        function updateStatus(message, type = 'info') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }

        // Включение уведомлений
        async function enableNotifications() {
            if (!("Notification" in window)) {
                updateStatus('❌ Ваш браузер не поддерживает уведомления', 'error');
                return;
            }
            
            const permission = await Notification.requestPermission();
            notificationPermission = permission === "granted";
            
            if (notificationPermission) {
                updateStatus('✅ Уведомления включены! Вы будете получать оповещения о новых товарах', 'success');
                showNotification('Уведомления включены', 'Теперь вы будете получать оповещения о новых товарах');
            } else {
                updateStatus('❌ Уведомления отклонены', 'error');
            }
        }

        // Тестовое уведомление
        function testNotification() {
            if (notificationPermission) {
                showNotification('Тест', 'Уведомления работают корректно! 🎉');
                updateStatus('✅ Тестовое уведомление отправлено', 'success');
            } else {
                updateStatus('❌ Сначала включите уведомления', 'warning');
            }
        }

        // Загрузка товаров из Supabase
        async function loadProducts() {
            updateStatus('📦 Загрузка товаров из базы данных...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('products')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                productsData = data || [];
                displayProducts(productsData);
                updateStats(productsData);
                
                if (productsData.length === 0) {
                    updateStatus('⚠️ В базе данных пока нет товаров. Добавьте первый товар через форму ниже!', 'warning');
                } else {
                    updateStatus(`✅ Загружено ${productsData.length} товаров`, 'success');
                }
                
            } catch (error) {
                console.error('Ошибка загрузки:', error);
                updateStatus(`❌ Ошибка загрузки: ${error.message}`, 'error');
                
                if (error.message.includes('relation') || error.message.includes('does not exist')) {
                    updateStatus('❌ Таблица "products" не найдена! Создайте её в Supabase (см. инструкцию ниже)', 'error');
                    showCreateTableInstructions();
                }
            }
        }

        // Отображение товаров
        function displayProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        🛍️ <br><br>
                        <strong>Товаров пока нет</strong><br>
                        Добавьте первый товар через форму ниже или создайте таблицу "products" в Supabase
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="products-grid">
                    ${products.map(product => `
                        <div class="product-card">
                            <div class="product-image">
                                ${getCategoryIcon(product.category)}
                            </div>
                            <div class="product-info">
                                <span class="product-category">${product.category || 'Спорт'}</span>
                                <div class="product-title">${escapeHtml(product.name)}</div>
                                <div class="product-price">${product.price.toLocaleString()} ₽</div>
                                <div class="product-description">${escapeHtml(product.description || 'Нет описания')}</div>
                                <button class="btn-buy" onclick="buyProduct('${product.id}', '${escapeHtml(product.name)}', ${product.price})">
                                    🛒 Купить
                                </button>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // Получение иконки для категории
        function getCategoryIcon(category) {
            const icons = {
                'Футбол': '⚽',
                'Баскетбол': '🏀',
                'Теннис': '🎾',
                'Фитнес': '💪',
                'Бег': '🏃',
                'Плавание': '🏊'
            };
            return icons[category] || '🎯';
        }

        // Обновление статистики
        function updateStats(products) {
            if (products.length === 0) {
                document.getElementById('stats').style.display = 'none';
                return;
            }
            
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('totalProducts').textContent = products.length;
            
            const uniqueCategories = [...new Set(products.map(p => p.category))];
            document.getElementById('totalCategories').textContent = uniqueCategories.length;
            
            const avgPrice = products.reduce((sum, p) => sum + p.price, 0) / products.length;
            document.getElementById('avgPrice').textContent = Math.round(avgPrice).toLocaleString() + ' ₽';
        }

        // Добавление товара
        async function addProduct() {
            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const category = document.getElementById('productCategory').value;
            const description = document.getElementById('productDesc').value.trim();
            
            if (!name) {
                updateStatus('❌ Введите название товара', 'error');
                return;
            }
            
            if (!price || price <= 0) {
                updateStatus('❌ Введите корректную цену', 'error');
                return;
            }
            
            const newProduct = {
                name: name,
                price: price,
                category: category,
                description: description || 'Новый товар в SportMaster',
                created_at: new Date().toISOString()
            };
            
            try {
                updateStatus('💾 Добавление товара в базу...', 'info');
                
                const { data, error } = await supabase
                    .from('products')
                    .insert([newProduct])
                    .select();
                
                if (error) throw error;
                
                updateStatus('✅ Товар успешно добавлен!', 'success');
                showNotification('Новый товар добавлен', `${name} - ${price} ₽`);
                
                // Очищаем форму
                document.getElementById('productName').value = '';
                document.getElementById('productPrice').value = '';
                document.getElementById('productDesc').value = '';
                
                // Перезагружаем товары
                await loadProducts();
                
            } catch (error) {
                console.error('Ошибка добавления:', error);
                updateStatus(`❌ Ошибка: ${error.message}`, 'error');
                
                if (error.message.includes('relation') || error.message.includes('does not exist')) {
                    showCreateTableInstructions();
                }
            }
        }

        // Покупка товара
        function buyProduct(id, name, price) {
            showNotification('Товар добавлен в корзину', `${name} - ${price} ₽`);
            updateStatus(`🛒 "${name}" добавлен в корзину!`, 'success');
            showToast('В корзине', `${name} - ${price} ₽`);
        }

        // Очистка всех товаров (только для тестирования)
        async function clearProducts() {
            if (!confirm('⚠️ ВНИМАНИЕ! Это удалит ВСЕ товары из базы данных. Продолжить?')) {
                return;
            }
            
            try {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .neq('id', 0);
                
                if (error) throw error;
                
                updateStatus('🗑️ Все товары удалены', 'warning');
                await loadProducts();
                
            } catch (error) {
                console.error('Ошибка удаления:', error);
                updateStatus(`❌ Ошибка: ${error.message}`, 'error');
            }
        }

        // Инструкция по созданию таблицы
        function showCreateTableInstructions() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = `
                <div class="empty-state">
                    <strong>📋 Инструкция по созданию таблицы "products" в Supabase</strong><br><br>
                    1. Откройте Supabase Dashboard<br>
                    2. Перейдите в раздел "SQL Editor"<br>
                    3. Вставьте и выполните следующий SQL-запрос:<br><br>
                    <code style="background: #f4f4f4; padding: 10px; display: block; text-align: left;">
                        CREATE TABLE products (<br>
                        &nbsp;&nbsp;id SERIAL PRIMARY KEY,<br>
                        &nbsp;&nbsp;name TEXT NOT NULL,<br>
                        &nbsp;&nbsp;price INTEGER NOT NULL,<br>
                        &nbsp;&nbsp;category TEXT,<br>
                        &nbsp;&nbsp;description TEXT,<br>
                        &nbsp;&nbsp;created_at TIMESTAMP DEFAULT NOW()<br>
                        );<br><br>
                        
                        INSERT INTO products (name, price, category, description) VALUES<br>
                        ('Футбольный мяч', 1999, 'Футбол', 'Профессиональный футбольный мяч'),<br>
                        ('Баскетбольное кольцо', 4999, 'Баскетбол', 'Регулируемое баскетбольное кольцо'),<br>
                        ('Теннисная ракетка', 2999, 'Теннис', 'Легкая теннисная ракетка');
                    </code><br><br>
                    4. Нажмите "Run" и обновите страницу
                </div>
            `;
        }

        // Экранирование HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Подписка на изменения в реальном времени
        function subscribeToProducts() {
            supabase
                .channel('products-changes')
                .on('postgres_changes', 
                    { event: '*', schema: 'public', table: 'products' }, 
                    (payload) => {
                        console.log('Изменение в товарах:', payload);
                        loadProducts(); // Автоматически перезагружаем товары
                        
                        if (payload.eventType === 'INSERT') {
                            showNotification('Новый товар!', `${payload.new.name} добавлен в магазин`);
                        }
                    }
                )
                .subscribe();
        }

        // Инициализация
        window.addEventListener('DOMContentLoaded', async () => {
            await loadProducts();
            subscribeToProducts();
            
            // Проверяем разрешение на уведомления
            if (Notification.permission === "granted") {
                notificationPermission = true;
            }
        });
    </script>
</body>
</html>
